services:
  promitto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: promitto
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL:-https://wa.muhfaza.my.id}
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_PATH: /app/backend/data/promitto.db
      SESSIONS_DIR: /app/backend/data/sessions
      LOG_LEVEL: ${LOG_LEVEL:-info}
      BAILEYS_LOG_LEVEL: ${BAILEYS_LOG_LEVEL:-silent}
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-Asia/Jakarta}
      TRUST_PROXY: "true"
    volumes:
      - ./backend/data:/app/backend/data
    networks:
      - web
    labels:
      - traefik.enable=true
      - traefik.docker.network=web
      - traefik.http.routers.promitto.rule=Host(`wa.muhfaza.my.id`)
      - traefik.http.routers.promitto.entrypoints=websecure
      - traefik.http.routers.promitto.tls=true
      - traefik.http.routers.promitto.tls.certresolver=le
      - traefik.http.services.promitto.loadbalancer.server.port=3000
      - traefik.http.routers.promitto.middlewares=promitto-hsts@docker
      - traefik.http.middlewares.promitto-hsts.headers.stsSeconds=31536000
      - traefik.http.middlewares.promitto-hsts.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.promitto-hsts.headers.stsPreload=true

networks:
  web:
    external: true
